<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEMU – Attendance System</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.4);
      --accent: #60a5fa;
      --bg-dark: #0f172a;
      --bg-slate: #1e293b;
    }

    body {
      height: auto;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      perspective: 1000px;
    }

    
    .bg-mesh {
      position: fixed;
      inset: 0;
      background: 
        linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)),
        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
      z-index: -1;
    }
    .bg-mesh::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, var(--primary-glow) 0%, transparent 60%);
      animation: pulseGlow 8s infinite alternate;
    }

    .login-page { 
      min-height:100vh; 
      background: radial-gradient(circle at center, #1e293b 0%, #080c14 100%); 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      justify-content:center; 
      padding:24px; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      perspective: 2000px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 30px;
      transform-style: preserve-3d;
      animation: float3D 6s ease-in-out infinite;
    }
    .logo-box {
      width: 150px;
      height: 150px;
      border-radius: 32px;
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
      padding: 15px;
      background: #0b1120;
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.6),
        0 0 40px var(--primary-glow);
      transform: translateZ(50px) rotateX(10deg);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .logo-box:hover {
      transform: translateZ(100px) rotateX(0deg) scale(1.05);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 0 0 60px var(--primary-glow);
      border-color: var(--accent);
    }

    .login-header { 
      text-align:center; 
      width:100%; 
      max-width:400px; 
      margin-bottom:40px; 
      transform-style: preserve-3d;
      animation: fadeInUp3D 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .login-header h1 { 
      font-size:26px; 
      font-weight:800; 
      color:#fff; 
      line-height:1.2; 
      letter-spacing: -0.5px; 
      text-transform: uppercase; 
      background: linear-gradient(135deg, #fff 0%, #60a5fa 100%); 
      -webkit-background-clip: text; 
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .role-grid { 
      display:grid; 
      grid-template-columns:1fr 1fr; 
      gap:16px; 
      width:100%; 
      max-width:420px; 
      margin-bottom:30px; 
      transform-style: preserve-3d;
      animation: entrance3D 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }
    .role-btn {
      padding:24px 16px; 
      border-radius:20px; 
      border:1px solid rgba(255, 255, 255, 0.08);
      background: rgba(30, 41, 59, 0.4); 
      color: var(--text-muted); 
      font-weight:700; 
      font-size:15px;
      cursor:pointer; 
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      gap:12px; 
      font-family:inherit;
      backdrop-filter: blur(12px);
      transform-style: preserve-3d;
    }
    .role-btn svg { transform: translateZ(20px); transition: transform 0.4s ease; }
    .role-btn:hover { 
      border-color:var(--primary); 
      color:#fff; 
      background: rgba(59, 130, 246, 0.1); 
      transform: translateZ(30px) translateY(-5px); 
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .role-btn:hover svg { transform: translateZ(40px) scale(1.2) rotate(5deg); color: var(--accent); }
    .role-btn.selected { 
      border-color:var(--primary); 
      color:var(--accent); 
      background:rgba(59,130,246,0.15); 
      box-shadow: 0 0 30px var(--primary-glow);
      transform: translateZ(20px);
    }
    
    .login-box {
      background: rgba(15, 23, 42, 0.7); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      border-radius: 32px;
      padding: 40px; 
      width: 100%; 
      max-width: 420px;
      backdrop-filter: blur(24px);
      box-shadow: 
        0 40px 100px -20px rgba(0, 0, 0, 0.8),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
      transform-style: preserve-3d;
      animation: entrance3D 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .login-box h2 {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .login-box p.sub { color: var(--text-muted); margin-bottom: 25px; font-size: 14px; }

    .fld {
      margin-bottom: 20px;
      text-align: left;
    }
    .fld label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #3b82f6;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      margin-left: 4px;
    }
    .fld input {
      width: 100%;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 14px 18px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }
    .fld input:focus {
      background: rgba(30, 41, 59, 0.6);
      border-color: var(--primary);
      box-shadow: 0 0 20px var(--primary-glow), inset 0 2px 4px rgba(0,0,0,0.2);
      transform: translateY(-2px);
    }

    .back-lnk { color: var(--text-muted); text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }
    .back-lnk:hover {
      color: #fff;
      transform: translateX(-4px);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
      margin-top: 10px;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
      filter: brightness(1.1);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .hint-note {
      font-size: 12px;
      color: #60a5fa;
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 8px;
      border-left: 3px solid var(--primary);
    }

    .err { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; border-radius: 12px; padding: 12px 16px; font-size: 14px; margin-bottom: 20px; }
    .ok  { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #34d399; border-radius: 12px; padding: 12px 16px; font-size: 14px; margin-bottom: 20px; }

    @keyframes float3D {
      0%, 100% { transform: translateY(0) rotateX(5deg) rotateY(0); }
      50% { transform: translateY(-15px) rotateX(-5deg) rotateY(5deg); }
    }
    @keyframes entrance3D {
      from { opacity: 0; transform: translateZ(-200px) rotateX(20deg); }
      to { opacity: 1; transform: translateZ(0) rotateX(0); }
    }
    @keyframes fadeInUp3D {
      from { opacity: 0; transform: translateY(40px) translateZ(-100px); }
      to { opacity: 1; transform: translateY(0) translateZ(0); }
    }
    @keyframes pulseGlow {
      from { opacity: 0.3; transform: scale(0.8); }
      to { opacity: 0.6; transform: scale(1.2); }
    }

    body.light-mode .bg-mesh {
       background: linear-gradient(rgba(248, 250, 252, 0.95), rgba(241, 245, 249, 0.95)) !important;
    }
    body.light-mode .bg-mesh::before {
       background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 60%) !important;
    }
    body.light-mode .login-page {
       background: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%) !important;
    }
    body.light-mode .login-box {
       background: rgba(255, 255, 255, 0.8) !important;
       border: 1px solid rgba(0,0,0,0.06) !important;
       box-shadow: 0 30px 60px rgba(0,0,0,0.05) !important;
    }
    body.light-mode .login-box h2 { color: #1e293b !important; }
    body.light-mode .login-header h1 {
       background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%) !important;
       -webkit-background-clip: text !important;
       background-clip: text !important;
       -webkit-text-fill-color: transparent !important;
    }
    body.light-mode .logo-box {
       background: #ffffff !important;
       border-color: #cbd5e1 !important;
    }
    body.light-mode .role-btn {
       background: rgba(255, 255, 255, 0.6) !important;
       border: 1px solid #cbd5e1 !important;
       color: #1e293b !important;
    }
    body.light-mode .role-btn:hover {
       background: #ffffff !important;
       border-color: var(--primary) !important;
    }
    body.light-mode .fld label { color: var(--primary) !important; }
    body.light-mode .fld input {
       background: #f1f5f9 !important;
       border: 1px solid #cbd5e1 !important;
       color: #1e293b !important;
    }
    body.light-mode .fld input:focus {
       background: #ffffff !important;
    }

    @keyframes spin { to{transform:rotate(360deg)} }

    /* Login Mobile Polish */
    @media (max-width: 480px) {
      .login-header h1 { font-size: 20px; }
      .role-grid { grid-template-columns: 1fr; }
      .logo-box { width: 120px; height: 120px; border-radius: 24px; }
      .login-box { padding: 30px 24px; border-radius: 28px; }
      .btn-login { min-height: 44px; }
      .role-btn { padding: 18px 12px; }
    }
  </style>
</head>
<body class="login-page">
  <div class="bg-mesh"></div>
  <!-- Theme Toggle -->
  <button class="hamburger-btn" id="theme-toggle" onclick="THEME.toggle()" title="Toggle Theme" style="position:fixed; top:20px; right:20px; z-index:1000">
    <span id="theme-icon">☀️</span>
  </button>

  <div class="logo">
    <img src="logo.jpg" class="logo-box" alt="Logo">
  </div>

  <div class="login-header">
    <h1>VEMU INSTITUTE OF TECHNOLOGY</h1>
    <p>Attendance Management System</p>
  </div>

  <!-- Role Selection -->
  <div id="role-screen" style="width:100%;max-width:400px">
    <p style="font-size:12px;color:#64748b;margin-bottom:12px;text-align:center">Select your role to continue</p>
    <div class="role-grid">
      <button class="role-btn" id="rb-admin" onclick="selectRole('admin','Admin')">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        Admin
      </button>
      <button class="role-btn" id="rb-hods" onclick="selectRole('hods','HOD')">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        HOD
      </button>
      <button class="role-btn" id="rb-teachers" onclick="selectRole('teachers','Faculty')">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        Faculty
      </button>
      <button class="role-btn" id="rb-students" onclick="selectRole('students','Student')">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
        Student
      </button>
    </div>
  </div>

  <!-- Login Form -->
  <div id="login-screen" class="hidden" style="width:100%;max-width:400px">
    <button class="back-lnk" onclick="goBack()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      Back to role selection
    </button>
    <div class="login-box holographic-glass">
      <h2 id="form-title">Sign In</h2>
      <p class="sub" id="form-sub">Enter your credentials</p>

      <form id="login-form" autocomplete="off" onsubmit="doLogin(event)">
        <div class="fld">
          <label id="uid-label">User ID</label>
          <input type="text" id="uid-in" autocomplete="username" spellcheck="false">
        </div>
        <div class="fld" id="pwd-wrap">
          <label id="pwd-label">Password</label>
          <input type="password" id="pwd-in" autocomplete="current-password">
          <div class="hint-note" id="pwd-hint" style="display:none"></div>
        </div>
        <div id="err-box" class="err hidden"></div>
        <div id="ok-box"  class="ok  hidden"></div>
        <button type="submit" class="btn-login" id="login-btn">
          <span id="btn-lbl">Sign In</span>
          <span id="btn-spin" class="spin hidden"></span>
        </button>
      </form>
      <div class="chairman-branding reveal-5">
        <div class="chairman-name">Dr. K. Chandrashekhar Naidu</div>
        <div class="chairman-title">Hon'ble Chairman – VEMU Group</div>
      </div>
    </div>
  </div>

<script src="app.js"></script>
<script>
  let currentRole = null;

  function selectRole(role, label) {
    currentRole = role;
    document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
    document.getElementById('rb-'+role)?.classList.add('selected');

    document.getElementById('role-screen').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('form-title').textContent = `Sign in as ${label}`;

    if (role === 'students') {
      document.getElementById('uid-label').textContent = 'Roll Number';
      document.getElementById('pwd-label').textContent = 'Password (same as Roll Number)';
      document.getElementById('pwd-hint').textContent  = 'Your password is your roll number.';
      document.getElementById('pwd-hint').style.display = 'block';
      document.getElementById('form-sub').textContent = 'Enter your roll number as both ID and password';
    } else {
      document.getElementById('uid-label').textContent = 'User ID';
      document.getElementById('pwd-label').textContent = 'Password';
      document.getElementById('pwd-hint').style.display = 'none';
      document.getElementById('form-sub').textContent = 'Enter your credentials to continue';
    }

    document.getElementById('uid-in').value = '';
    document.getElementById('pwd-in').value = '';
    document.getElementById('err-box').classList.add('hidden');
    document.getElementById('ok-box').classList.add('hidden');
    document.getElementById('uid-in').focus();
  }

  function goBack() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('role-screen').classList.remove('hidden');
    currentRole = null;
  }

  async function doLogin(e) {
    e.preventDefault();
    const uid = document.getElementById('uid-in').value.trim();
    const pwd = document.getElementById('pwd-in').value.trim();
    const errEl = document.getElementById('err-box');
    const okEl  = document.getElementById('ok-box');
    const btn   = document.getElementById('login-btn');
    const spin  = document.getElementById('btn-spin');
    const lbl   = document.getElementById('btn-lbl');

    errEl.classList.add('hidden');
    okEl.classList.add('hidden');

    if (!uid || !pwd) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    spin.classList.remove('hidden');
    lbl.textContent = 'Signing in…';

    const result = await AUTH.login(currentRole, uid, pwd);

    spin.classList.add('hidden');
    btn.disabled = false;
    lbl.textContent = 'Sign In';

    if (!result.success) {
      errEl.textContent = result.message;
      errEl.classList.remove('hidden');
      document.getElementById('pwd-in').value = '';
      return;
    }

    AUTH.setSession(result.user);
    okEl.textContent = `Logged in as ${result.user.name}. Redirecting…`;
    okEl.classList.remove('hidden');
    setTimeout(()=>AUTH.redirectByRole(result.user.role), 800);
  }

  // ── Init ──
window.addEventListener('app_ready', () => {
    // index.html is the login page, no dashboard init needed here
});
</script>
</body>
</html>
